<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Globe outline -->
  <circle cx="32" cy="32" r="26" stroke="#667eea" stroke-width="4" fill="none"/>
  <!-- Meridian -->
  <ellipse cx="32" cy="32" rx="12" ry="26" stroke="#667eea" stroke-width="3" fill="none"/>
  <!-- Equator -->
  <line x1="6" y1="32" x2="58" y2="32" stroke="#667eea" stroke-width="3"/>
  <!-- Parallels -->
  <line x1="9" y1="20" x2="55" y2="20" stroke="#667eea" stroke-width="3"/>
  <line x1="9" y1="44" x2="55" y2="44" stroke="#667eea" stroke-width="3"/>
</svg>
